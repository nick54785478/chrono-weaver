pekko {
  # ==========================================
  # 1. 核心與叢集設定 (Cluster & Sharding)
  # ==========================================
  actor {
    provider = "cluster"
    
    # 開啟 Jackson 序列化，將 Java Record 轉為二進位 (CBOR) 以便存入資料庫或在網路間傳遞
    serialization-bindings {
      # 1. 註冊所有的 Command 介面
      "com.example.demo.application.shared.command.ProjectCommand" = jackson-cbor
      
      # 2. 註冊回傳物件 Response
      "com.example.demo.application.shared.response.ProjectResponse" = jackson-cbor
      
      # 3. 註冊所有的 Event 介面 (寫入 Cassandra 用)
      "com.example.demo.application.domain.project.event.ProjectEvent" = jackson-cbor
      
      "com.example.demo.application.domain.team.event.ProjectTeamEvent" = jackson-cbor
      
      # 4. 註冊聚合根的 State (Snapshot 快照用)
      "com.example.demo.application.domain.project.aggregate.Project" = jackson-cbor
    }
  }
  
  # 🌟 新增這段：將自訂的 Jackson Module 註冊進 Pekko
  serialization {
    jackson {
      jackson-modules += "com.example.demo.config.module.DomainEventJacksonModule"
    }
  }

  # 單機開發模式的網路設定 (Artery TCP)
  remote {
    artery {
      canonical.hostname = "127.0.0.1"
      canonical.port = 2551
    }
  }

  cluster {
    # 宣告自己為 Seed Node (種子節點)，讓本機啟動時自動組建成單節點叢集
    seed-nodes = [
      "pekko://ChronoWeaverSystem@127.0.0.1:2551"
    ]
    # 腦裂防護策略 (單機開發可有可無，但正式環境必備)
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
  }

  # ==========================================
  # 2. 持久化與 Event Sourcing 設定
  # ==========================================
  persistence {
    journal {
      plugin = "pekko.persistence.cassandra.journal"
      # 為了 CQRS Projection 支援 Tag 查詢，必須啟用 auto-start
      auto-start-journals = ["pekko.persistence.cassandra.journal"]
    }
    snapshot-store.plugin = "pekko.persistence.cassandra.snapshot"
    
    # Cassandra 外掛的細部設定
    cassandra {
      journal {
        # 神器：開發階段自動在 Cassandra 建立 Keyspace 與 Table
        keyspace-autocreate = true
        tables-autocreate = true

        # 註冊事件向上轉型器 (Event Upcasters)
        event-adapters {
          # 為你的 Upcaster 取一個代號，並指定完整類別路徑
          project-upcaster = "com.example.demo.infra.event.upcaster.ProjectEventUpcaster"
        }
        event-adapter-bindings {
          # 宣告「當讀取到哪個類別時，要交給哪個 upcaster 處理」
          # 這裡綁定我們加回來的 @Deprecated 舊事件
          "com.example.demo.application.domain.project.event.ProjectEvent$TaskDependencyAdded" = project-upcaster
        }
      }
      snapshot {
        keyspace-autocreate = true
        tables-autocreate = true
      }
      events-by-tag {
        # Projection 查詢事件的延遲設定，1秒代表讀取端最多延遲 1 秒
        eventual-consistency-delay = 1s
        flush-interval = 1s
        pubsub-notification = on
      }
    }
  }

  # ==========================================
  # 4. Projection 書籤 (Offset Store) 設定
  # ==========================================
  projection {
    cassandra {
      offset-store {
        keyspace = "pekko_projection"
        keyspace-autocreate = true
        tables-autocreate = true
      }
    }
  }
}

# ==========================================
# 3. Datastax Java Driver (Cassandra 實際連線設定)
# ==========================================
datastax-java-driver {
  advanced.reconnect-on-init = true
  basic.contact-points = ["127.0.0.1:9042"]
  basic.load-balancing-policy {
    # 這裡的 "datacenter1" 必須與 docker-compose 裡的 CASSANDRA_DC 參數一模一樣
    local-datacenter = "datacenter1" 
  }
}