spring.application.name=chrono-weaver-system

# ==========================================
# Read Side: PostgreSQL (Spring Data JPA)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/pekko_read_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate 設定
# update: 開發階段自動根據 Entity 建立或更新資料表 (正式環境建議改為 validate)
spring.jpa.hibernate.ddl-auto=update

# 在終端機印出執行的 SQL 語法，方便開發除錯
spring.jpa.show-sql=true

# 格式化輸出的 SQL，使其更容易閱讀
spring.jpa.properties.hibernate.format_sql=true

# 明確指定資料庫方言 (Dialect)，優化 SQL 產出
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 讓 Spring Boot 延遲初始化 JPA，加快啟動速度 (可選)
spring.jpa.open-in-view=false