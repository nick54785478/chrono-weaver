<div class="p-4" *ngIf="!loading; else skeleton">
  <div
    class="flex flex-column md:flex-row justify-content-between align-items-start md:align-items-center mb-5 gap-3"
  >
    <div>
      <h1 class="text-3xl font-bold m-0 text-900">{{ project?.name }}</h1>
      <p class="text-500 m-0 mt-2">
        <i class="pi pi-building mr-1"></i> 租戶: {{ tenantId }} |
        <i class="pi pi-hashtag mr-1"></i> ID:
        <span class="font-mono text-sm">{{ project?.projectId }}</span>
      </p>
    </div>
    <div class="flex gap-2">
      <p-tag
        styleClass="px-3 py-2 text-sm"
        severity="info"
        value="進行中"
        icon="pi pi-spin pi-cog"
      ></p-tag>
    </div>
  </div>

  <div class="grid mb-5">
    <div class="col-12 md:col-6 lg:col-4">
      <p-card styleClass="h-full shadow-2 border-round-xl">
        <div class="text-500 font-medium mb-3">專案整體進度</div>
        <div class="flex align-items-center justify-content-between mb-2">
          <span class="text-3xl font-bold text-900"
            >{{ overallProgress }}%</span
          >
          <i class="pi pi-chart-line text-2xl text-blue-500"></i>
        </div>
        <p-progressBar
          [value]="overallProgress"
          [showValue]="false"
          styleClass="h-1rem"
        ></p-progressBar>
      </p-card>
    </div>

    <div class="col-12 md:col-6 lg:col-4">
      <p-card styleClass="h-full shadow-2 border-round-xl">
        <div class="text-500 font-medium mb-3">任務完成度</div>
        <div class="flex align-items-center justify-content-between mb-2">
          <span class="text-3xl font-bold text-900"
            >{{ completedTasks }}
            <span class="text-lg text-500 font-normal"
              >/ {{ tasks.length }}</span
            ></span
          >
          <i class="pi pi-check-square text-2xl text-green-500"></i>
        </div>
        <div class="text-sm text-500 mt-2">已完成的模組數量</div>
      </p-card>
    </div>

    <div class="col-12 md:col-6 lg:col-4">
      <p-card styleClass="h-full shadow-2 border-round-xl">
        <div class="text-500 font-medium mb-3">團隊規模</div>
        <div class="flex align-items-center justify-content-between mb-2">
          <span class="text-3xl font-bold text-900"
            >{{ members.length }}
            <span class="text-lg text-500 font-normal">人</span></span
          >
          <i class="pi pi-users text-2xl text-orange-500"></i>
        </div>
        <div class="flex mt-3">
          <p-avatar
            *ngFor="let m of members | slice: 0 : 4"
            icon="pi pi-user"
            shape="circle"
            styleClass="mr-2 bg-blue-100 text-blue-600"
          ></p-avatar>
          <p-avatar
            *ngIf="members.length > 4"
            [label]="'+' + (members.length - 4)"
            shape="circle"
            styleClass="bg-gray-100 text-gray-600"
          ></p-avatar>
        </div>
      </p-card>
    </div>
  </div>

  <div class="grid">
    <div class="col-12 lg:col-8">
      <p-card header="任務概覽" styleClass="h-full shadow-2 border-round-xl">
        <ng-template pTemplate="header">
          <div class="flex justify-content-between align-items-center p-4 pb-0">
            <span class="text-xl font-bold">近期任務</span>
            <button
              pButton
              label="查看甘特圖"
              icon="pi pi-calendar"
              class="p-button-text p-button-sm"
              (click)="navigateToGantt()"
            ></button>
          </div>
        </ng-template>

        <ul class="list-none p-0 m-0">
          <li
            *ngFor="let task of tasks | slice: 0 : 5"
            class="flex flex-column md:flex-row md:align-items-center py-3 border-bottom-1 surface-border"
          >
            <div class="flex-1 font-semibold text-700 mb-2 md:mb-0">
              {{ task.name }}
            </div>
            <div class="w-full md:w-4 flex align-items-center gap-3">
              <p-progressBar
                [value]="task.progress"
                [showValue]="false"
                class="flex-1"
                styleClass="h-1rem"
              ></p-progressBar>
              <span class="text-sm font-medium w-3rem text-right"
                >{{ task.progress }}%</span
              >
            </div>
          </li>
          <li *ngIf="tasks.length === 0" class="py-3 text-500 text-center">
            目前尚無任務
          </li>
        </ul>
      </p-card>
    </div>

    <div class="col-12 lg:col-4">
      <p-card styleClass="h-full shadow-2 border-round-xl">
        <ng-template pTemplate="header">
          <div class="flex justify-content-between align-items-center p-4 pb-0">
            <span class="text-xl font-bold">核心團隊</span>
            <button
              pButton
              icon="pi pi-cog"
              class="p-button-rounded p-button-text"
              pTooltip="管理團隊"
              (click)="navigateToTeams()"
            ></button>
          </div>
        </ng-template>

        <ul class="list-none p-0 m-0 mt-3">
          <li
            *ngFor="let member of members | slice: 0 : 5"
            class="flex align-items-center py-3 border-bottom-1 surface-border"
          >
            <p-avatar
              icon="pi pi-user"
              shape="circle"
              size="large"
              styleClass="mr-3 bg-indigo-100 text-indigo-600"
            ></p-avatar>
            <div class="flex-1">
              <div class="font-bold text-700">{{ member.userId }}</div>
              <div class="text-sm text-500 mt-1">{{ member.role }}</div>
            </div>
          </li>
        </ul>
      </p-card>
    </div>
  </div>
</div>

<ng-template #skeleton>
  <div
    class="p-4 flex justify-content-center align-items-center"
    style="height: 60vh"
  >
    <i class="pi pi-spin pi-spinner text-6xl text-primary"></i>
  </div>
</ng-template>
