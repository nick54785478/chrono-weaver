<div class="flex h-screen overflow-hidden surface-ground">
  <div class="hidden lg:flex h-full">
    <app-sidebar></app-sidebar>
  </div>

  <div class="flex-1 flex flex-column h-screen overflow-hidden">
    <div
      class="h-4rem surface-card border-bottom-1 surface-border flex align-items-center justify-content-between px-4 shadow-1 z-1"
    >
      <div class="flex align-items-center gap-2">
        <p-button
          icon="pi pi-bars"
          [text]="true"
          [rounded]="true"
          severity="secondary"
          class="lg:hidden"
          (onClick)="isMobileSidebarVisible = true"
        />

        <div class="font-semibold text-lg text-color-secondary">工作區</div>
      </div>

      <div class="flex gap-2">
        <p-button
          icon="pi pi-bell"
          [text]="true"
          [rounded]="true"
          severity="secondary"
        />
        <p-button
          icon="pi pi-cog"
          [text]="true"
          [rounded]="true"
          severity="secondary"
        />
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4">
      <div class="max-w-screen-xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>

<p-sidebar [(visible)]="isMobileSidebarVisible" styleClass="w-16rem p-0">
  <ng-template pTemplate="content">
    <app-sidebar></app-sidebar>
  </ng-template>
</p-sidebar>
